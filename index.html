<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modli Exam Management</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<link rel="stylesheet" href="./src/views/css/style.css">
<link rel="icon" type="image/png" href="./src/views/media/image/modli.png">
</head>

<body>
<!-- LOGIN MODAL -->
<div id="loginOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center;">
    <div class="login-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <img src="./src/views/media/image/modli.png" style="height: 60px; margin-bottom: 16px;">
            <h2 style="font-size: 1.5rem; color: #1e293b; font-family: 'Outfit'; margin: 0;">Admin Access</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: 8px;">Please sign in to manage exams</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #475569;">Email Address</label>
                <input type="email" id="loginEmail" required placeholder="admin@modli.com" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none;">
            </div>
            <div class="form-group" style="margin-bottom: 28px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #475569;">Password</label>
                <input type="password" id="loginPass" required placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button type="submit" class="primary" style="width: 100%; padding: 14px; font-weight: 600;">Sign In</button>
                <button type="button" onclick="hideLogin()" style="width: 100%; background: none; border: none; color: #64748b; font-size: 0.9rem; cursor: pointer;">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div class="container">

<header class="page-header">
    <div class="page-title">
        <img src="./src/views/media/image/modli.png" alt="Modli Logo" class="header-icon">
        <span>Placement Test Admin</span>
    </div>
    
    <div class="auth-section">
        <div id="adminNav" style="display: none;">
            <button onclick="setView('list')" id="nav-list" class="active">Exams</button>
            <button onclick="setView('orgs')" id="nav-orgs">Organizations</button>
            <button onclick="showReport()" id="nav-report">Reports</button>
        </div>
        <button id="loginBtn" class="primary" onclick="showLogin()">Admin Login</button>
        <button id="logoutBtn" class="secondary" onclick="handleLogout()" style="display: none;">Logout</button>
        <a href="./src/views/html/Exam_take.html" id="takeExamButton" target="_blank">Student View →</a>
    </div>
</header>

<div id="notificationArea" class="notification"></div>

<!-- LIST VIEW -->
<div id="listView" class="view">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-family: 'Outfit'; font-size: 1.5rem;">Saved Exams</h2>
        <button class="primary admin-only" onclick="setView('form',true)">+ Add New Exam</button>
    </div>
    <div id="examList">
        <!-- Cards will be injected here -->
        <p id="loadingMessage">Loading exams...</p>
    </div>
</div>

<!-- ORGANIZATIONS VIEW -->
<div id="orgsView" class="view" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Manage Organizations</h2>
    </div>
    <div class="filter-card" style="margin-bottom: 24px;">
        <div style="display: flex; gap: 12px;">
            <input type="text" id="newOrgName" placeholder="Enter organization name..." style="flex-grow: 1;">
            <button class="primary" onclick="addOrganization()">+ Add Organization</button>
        </div>
    </div>
    <div id="orgList">
        <p style="color: var(--text-muted);">Loading organizations...</p>
    </div>
</div>

<!-- FORM VIEW -->
<div id="formView" class="view" style="display:none;">
    <button class="secondary" onclick="setView('list')">← Back to List</button>
    <form id="examForm">
        <input type="hidden" id="examKey">
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label>Exam Title:</label>
            <input type="text" id="examTitle" required placeholder="Enter exam title...">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>Target Organization:</label>
            <select id="examOrg" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; outline: none; background: white;">
                <option value="all">All Organizations (Public)</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="examVisibility" style="width: 20px; height: 20px;" checked>
            <label for="examVisibility" style="margin: 0; font-weight: 600;">Visible to Students</label>
        </div>

        <div id="questionsContainer"></div>

        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="button" class="secondary" onclick="addQuestion()">+ Add Question</button>
            <button type="submit" class="primary">Save Exam</button>
        </div>
    </form>
</div>

<!-- REPORT VIEW -->
<div id="report" class="view" style="display:none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Exam Report</h2>
        <button onclick="setView('list')" class="secondary">Back to List</button>
    </div>

    <div class="card-view" style="margin-bottom: 32px; padding: 24px; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; align-items: end;">
            <div class="form-group">
                <label>📅 From</label>
                <input type="date" id="dateFrom">
            </div>

            <div class="form-group">
                <label>📅 To</label>
                <input type="date" id="dateTo">
            </div>

            <div class="form-group">
                <label>🏢 Organization</label>
                <select id="filterOrg">
                    <option value="all">All Organizations</option>
                </select>
            </div>

            <div class="form-group">
                <label>👤 Student Name</label>
                <input type="text" id="filterName" placeholder="Search name...">
            </div>

            <div class="form-group">
                <label>🆔 National ID</label>
                <input type="text" id="filterId" placeholder="Search ID...">
            </div>

            <div class="button-group">
                <button onclick="showReport()" class="primary" style="width: 100%; height: 48px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem;">
                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    Search Records
                </button>
            </div>
        </div>
    </div>

    <div id="reportContent"></div>
    
    <div style="text-align:center; margin-top: 32px; display: flex; gap: 12px; justify-content: center;">
        <button onclick="clearAllResults()" class="danger">Clear All Data</button>
        <button onclick="printReport()" class="secondary">Print as PDF</button>
    </div>
</div>

<!-- CUSTOM CONFIRM MODAL -->
<div id="confirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 3000; align-items: center; justify-content: center;">
    <div style="background: white; padding: 32px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        <div style="width: 56px; height: 56px; background: #fee2e2; color: #dc2626; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <svg style="width: 32px; height: 32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h3 id="confirmTitle" style="font-size: 1.25rem; color: #1e293b; margin-bottom: 12px;">Are you sure?</h3>
        <p id="confirmMsg" style="color: #64748b; margin-bottom: 24px;">This action cannot be undone.</p>
        <div style="display: flex; gap: 12px;">
            <button id="confirmCancel" class="secondary" style="flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;">Cancel</button>
            <button id="confirmBtn" class="danger" style="flex: 1; padding: 12px; border-radius: 10px; background: #dc2626; color: white; border: none; font-weight: 600; cursor: pointer;">Delete</button>
        </div>
    </div>
</div>

<footer class="footpage" style="text-align:center; margin-top: 40px; color: var(--text-muted); font-size: 0.9rem;">
    &copy; 2026 Modli Exam System — Developed by Atito
</footer>

</div>


<script src="./src/views/js/script.js?v=3.0"></script>
<script src="./src/views/js/View_Report.js?v=3.0"></script>
</body>
</html>
